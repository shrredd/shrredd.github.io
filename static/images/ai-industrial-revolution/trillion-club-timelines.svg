<line x1="310" y1="24" x2="310" y2="410" stroke="#e8eaee"/>
<text x="310" y="430" text-anchor="middle" style="font-size:12px;fill:#79839a">10</text>
<line x1="410" y1="24" x2="410" y2="410" stroke="#e8eaee"/>
<text x="410" y="430" text-anchor="middle" style="font-size:12px;fill:#79839a">20</text>
