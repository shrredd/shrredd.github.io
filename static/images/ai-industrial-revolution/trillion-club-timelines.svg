<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 468" role="img" aria-label="Bar chart of years from founding to a one trillion dollar valuation: Microsoft 44, Apple 42, NVIDIA 30, Amazon 24, SpaceX 24 via a private mark in the xAI merger, Alphabet 21, Tesla 18, Meta 17. OpenAI is at about 10 years and 852 billion dollars, Anthropic at 5 years and 965 billion, neither yet at a trillion." style="width:100%;height:auto;display:block;font-family:'Hanken Grotesk', Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif;font-variant-numeric:tabular-nums">
<title>Years from founding to a $1 trillion valuation</title>
<line x1="210" y1="24" x2="210" y2="410" stroke="#e8eaee"/>
