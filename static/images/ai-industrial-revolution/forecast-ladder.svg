<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 730 528" role="img" aria-label="Chart of AI growth forecasts as average annual U.S. real GDP growth over the next decade. Published forecasts cluster just above the roughly 2 percent no-AI baseline: Acemoglu, the CBO, and Goldman's 2026 read near 2.1 percent, Penn Wharton 2.2, the OECD's 2025 estimate 2.3 to 2.9, the IMF's 2026 U.S. forecast 2.4, and Anthropic's 2026 revision 2.4 to 2.5 after cutting its original 2025 estimate of about 3.8 percent. The beliefs in the room sit far higher: Collison at 5 percent, and the VC-room consensus at 7.2 to 11.6 percent if a 2 to 3x economy is meant." style="width:100%;height:auto;display:block;font-family:'Hanken Grotesk', Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif;font-variant-numeric:tabular-nums">
