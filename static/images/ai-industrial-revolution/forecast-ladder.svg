<text x="614.0" y="488" text-anchor="middle" style="font-size:12px;fill:#79839a">10%</text>
<line x1="710.0" y1="44" x2="710.0" y2="468" stroke="#e8eaee"/>
<text x="710.0" y="488" text-anchor="middle" style="font-size:12px;fill:#79839a">12%</text>
